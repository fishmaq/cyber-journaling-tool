<ng-container>
  <div class="team-card-wrapper">
    <div class="team-card-wrapper-header"
         [ngStyle]="{'background-color': (team()!.color_code === '' ? 'black': team()!.color_code)}">
      <div>TEAM-{{ team()!.name.toUpperCase() }}</div>
    </div>
    <div class="team-card-netplan-list-wrapper">
      @for (netplanGroup of team()!.netplan_group; track netplanGroup.id) {
        <netplan-netplan-group-card [netplanGroup]="netplanGroup"></netplan-netplan-group-card>
      }
    </div>
  </div>
</ng-container>
