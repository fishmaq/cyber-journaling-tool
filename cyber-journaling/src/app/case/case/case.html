<ng-container>
  <div class="case-title">Edit Cases</div>
  <div class="case-subtitle"></div>
  <div class="wrapper">
    <div class="new-case-button" (click)="create()">
      <mat-icon aria-hidden="false" aria-label="Create" fontIcon="add"></mat-icon>
      New Case
    </div>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> Id</th>
        <td mat-cell *matCellDef="let element"> {{ element.id }}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Title</th>
        <td mat-cell *matCellDef="let element"> {{ element.title }}</td>
      </ng-container>
      <ng-container matColumnDef="team">
        <th mat-header-cell *matHeaderCellDef> Team</th>
        <td mat-cell *matCellDef="let element"> {{ element.team.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-column"> Actions</th>
        <td mat-cell *matCellDef="let element">
          <mat-icon class="actions" aria-hidden="false" aria-label="Edit" fontIcon="edit"
                    (click)="edit(element)"></mat-icon>
          <mat-icon class="actions" aria-hidden="false" aria-label="Delete" fontIcon="delete"
                    (click)="delete(element)"></mat-icon>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns" class="table-header-row"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr *matNoDataRow>
        <td class="no-data" colspan="4">No Cases found.</td>
      </tr>
    </table>
  </div>
</ng-container>
