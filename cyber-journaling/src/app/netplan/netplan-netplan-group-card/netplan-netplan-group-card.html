<ng-container>
  <netplan-card
    [title]="netplanGroup()!.name.toUpperCase()"
    [titleFontSize]="'medium'"
    [backgroundColor]="netplanGroup()!.color_code ?? 'white'"
  >
      @for (host of netplanGroup()!.host; track host.id) {
        <netplan-host-card [host]="host"></netplan-host-card>
      }
  </netplan-card>
</ng-container>
