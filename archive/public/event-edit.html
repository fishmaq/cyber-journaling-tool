<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Event</title>
    <link rel="stylesheet" href="/public/styles.css" />
    <link rel="icon" type="image/png" href="/public/favicon.png" />
  </head>
  <body>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <header class="hero editor-header reveal delay-1">
      <div>
        <p class="eyebrow">Event Editor</p>
        <h1>Edit Event</h1>
        <p class="subtitle">
          Update event details and keep the case timeline accurate.
        </p>
      </div>
      <a href="/event-logger" class="secondary-btn link-btn back-link">Back to Event Logger</a>
    </header>

    <main class="editor-layout">
      <section class="panel reveal delay-2">
        <p id="edit-meta" class="muted">Loading event...</p>

        <form id="edit-event-form" class="form-grid">
          <label>
            Case
            <select id="main-case-id" required></select>
          </label>

          <div class="field-grid cols-2">
            <label>
              Time
              <input id="time" type="datetime-local" step="1" required />
            </label>

            <label>
              Severity
              <select id="severity" required>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
                <option>Critical</option>
              </select>
            </label>

            <label>
              Team Number
              <select id="team-number" required>
                <option value="1">1</option>
                <option value="2">2</option>
              </select>
            </label>

            <label>
              Event Type
              <select id="event-type" required>
                <option>Finding/ Evidence</option>
                <option>Action</option>
                <option>Decision</option>
                <option>Meeting</option>
                <option>Join/Leave</option>
                <option>Comms</option>
                <option>Note</option>
              </select>
            </label>
          </div>

          <label>
            Summary
            <input id="summary" type="text" maxlength="250" required />
          </label>

          <label>
            Details
            <textarea id="details"></textarea>
          </label>

          <div class="field-grid cols-2">
            <label>
              Services Affected
              <input id="services" list="services-list" />
              <datalist id="services-list"></datalist>
            </label>

            <label>
              Hosts Affected
              <input id="hosts" list="hosts-list" />
              <datalist id="hosts-list"></datalist>
            </label>

            <label>
              Owner
              <input id="owners" list="owners-list" />
              <datalist id="owners-list"></datalist>
            </label>

            <label>
              Tags
              <input id="tags" list="tags-list" />
              <datalist id="tags-list"></datalist>
            </label>
          </div>

          <div class="actions">
            <button id="save-edit-btn" class="primary-btn" type="submit">Save Changes</button>
          </div>
          <div id="edit-status" class="status" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <script type="module" src="/public/edit-event.ts"></script>
  </body>
</html>
