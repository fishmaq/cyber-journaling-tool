<ng-container>
  <netplan-card
    [title]="team()!.name.toUpperCase()"
    [titleFontSize]="'large'"
    [backgroundColor]="team()!.color_code ?? 'white'"
  >
      @for (netplanGroup of team()!.netplan_group; track netplanGroup.id) {
        <netplan-netplan-group-card [netplanGroup]="netplanGroup"></netplan-netplan-group-card>
      }
  </netplan-card>
</ng-container>
