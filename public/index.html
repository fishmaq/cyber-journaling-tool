<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber Attack Journal</title>
    <link rel="stylesheet" href="/public/styles.css" />
    <link rel="icon" type="image/png" href="/public/favicon.png" />
  </head>
  <body>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <header class="hero reveal delay-1">
      <div>
        <p class="eyebrow">Incident Command Timeline</p>
        <h1>Cyber Attack Journal</h1>
        <p class="subtitle">
          Main Cases hold the operation context. Sub Cases are the timeline events.
        </p>
      </div>
      <div class="hero-meta">
        <p class="hero-label">Current Time</p>
        <time id="header-clock" class="hero-clock">--</time>
        <button id="reset-time" class="ghost-btn" type="button">Sync Event Time</button>
      </div>
    </header>

    <main class="layout">
      <section class="stack">
        <article class="panel reveal delay-2">
          <div class="panel-head">
            <h2>Main Case Logger</h2>
            <span class="hint-chip">Top-level Case</span>
          </div>

          <form id="main-case-form" class="form-grid">
            <div class="field-grid cols-2">
              <label>
                Team Number
                <select id="case-team-number" required>
                  <option value="1">1</option>
                  <option value="2">2</option>
                </select>
              </label>

              <label>
                Severity
                <select id="case-severity" required>
                  <option>Low</option>
                  <option>Medium</option>
                  <option>High</option>
                  <option>Critical</option>
                </select>
              </label>

              <label>
                Status
                <select id="case-status" required>
                  <option>Triage</option>
                  <option>Event</option>
                  <option>Incident</option>
                  <option>Critical</option>
                  <option>Review</option>
                  <option>Closed</option>
                </select>
              </label>

              <label>
                Owner
                <input id="case-owner" type="text" required placeholder="SOC Lead, Team Alpha" />
              </label>
            </div>

            <label>
              Current Action / Next Steps
              <input id="case-current-action" type="text" placeholder="Containment, log collection, host isolation..." />
            </label>

            <label>
              Summary
              <input id="case-summary" type="text" maxlength="260" required placeholder="Short overview of the main case" />
            </label>

            <label>
              Details
              <textarea id="case-details" placeholder="Deeper context for this main case"></textarea>
            </label>

            <div class="actions">
              <button class="primary-btn" type="submit">Create Main Case</button>
            </div>
            <div id="main-case-status" class="status" aria-live="polite"></div>
          </form>
        </article>

        <article class="panel reveal delay-3">
          <div class="panel-head">
            <h2>New Sub Case Event</h2>
            <span class="hint-chip">Event under Main Case</span>
          </div>

          <form id="event-form" class="form-grid">
            <label>
              Main Case
              <select id="main-case-id" required></select>
            </label>

            <div class="field-grid cols-2">
              <label>
                Time
                <input id="time" type="datetime-local" step="1" required />
              </label>

              <label>
                Severity
                <select id="severity" required>
                  <option>Low</option>
                  <option>Medium</option>
                  <option>High</option>
                  <option>Critical</option>
                </select>
              </label>

              <label>
                Team Number
                <select id="team-number" required>
                  <option value="1">1</option>
                  <option value="2">2</option>
                </select>
              </label>

              <label>
                Event Type
                <select id="event-type" required>
                  <option>Finding/ Evidence</option>
                  <option>Action</option>
                  <option>Decision</option>
                  <option>Meeting</option>
                  <option>Join/Leave</option>
                  <option>Comms</option>
                  <option>Note</option>
                </select>
              </label>
            </div>

            <label>
              Summary
              <input id="summary" type="text" maxlength="250" required placeholder="Short event description" />
            </label>

            <label>
              Details
              <textarea id="details" placeholder="Evidence, timeline context, decisions..."></textarea>
            </label>

            <div class="field-grid cols-2">
              <label>
                Services Affected
                <input id="services" list="services-list" placeholder="API Gateway, VPN, SIEM" />
                <datalist id="services-list"></datalist>
                <span class="hint">Comma-separated. Stored for quick reuse.</span>
              </label>

              <label>
                Hosts Affected
                <input id="hosts" list="hosts-list" placeholder="srv-001, firewall-2" />
                <datalist id="hosts-list"></datalist>
                <span class="hint">Comma-separated. Stored for quick reuse.</span>
              </label>

              <label>
                Owner
                <input id="owners" list="owners-list" placeholder="SOC Lead, IR Team" />
                <datalist id="owners-list"></datalist>
                <span class="hint">Comma-separated. Stored for quick reuse.</span>
              </label>

              <label>
                Tags
                <input id="tags" list="tags-list" placeholder="phishing, lateral-movement" />
                <datalist id="tags-list"></datalist>
                <span class="hint">Comma-separated. Stored for quick reuse.</span>
              </label>
            </div>

            <div class="actions">
              <button id="save-event-btn" class="primary-btn" type="submit">Save Sub Case Event</button>
            </div>
            <div id="event-status" class="status" aria-live="polite"></div>
          </form>
        </article>

        <article class="panel reveal delay-4">
          <div class="panel-head">
            <h2>Quick Add Reusable Values</h2>
          </div>

          <form id="quick-add-form" class="form-grid compact">
            <div class="field-grid cols-2">
              <label>
                Field
                <select id="catalog-type" required>
                  <option value="services">Services Affected</option>
                  <option value="hosts">Hosts Affected</option>
                  <option value="owners">Owner</option>
                  <option value="tags">Tags</option>
                </select>
              </label>

              <label>
                Value
                <input id="catalog-name" type="text" required placeholder="Add value for future quick use" />
              </label>
            </div>

            <div class="actions">
              <button class="secondary-btn" type="submit">Add Value</button>
            </div>
            <div id="catalog-status" class="status" aria-live="polite"></div>
          </form>
        </article>
      </section>

      <section class="panel timeline reveal delay-5">
        <div class="panel-head timeline-head">
          <h2>Search & Timeline</h2>
          <button id="refresh-all" class="ghost-btn" type="button">Refresh</button>
        </div>

        <div class="search-grid">
          <label>
            Main Case Search
            <input id="case-search" type="search" placeholder="Search main case by ref, owner, status, summary..." />
          </label>
          <label>
            Journal Search
            <input id="event-search" type="search" placeholder="Search events, tags, hosts, services, text..." />
          </label>
          <label>
            Filter Events by Main Case
            <select id="event-main-case-filter">
              <option value="">All Main Cases</option>
            </select>
          </label>
        </div>

        <div class="split-view">
          <section class="split-panel">
            <h3>Main Cases</h3>
            <div id="main-cases-body" class="entry-list"></div>
          </section>

          <section class="split-panel">
            <h3>Sub Cases / Events</h3>
            <div id="events-body" class="entry-list"></div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/public/app.ts"></script>
  </body>
</html>
