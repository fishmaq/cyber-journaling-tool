<ng-container>
  <netplan-card
    [title]="host()!.name.toUpperCase()"
    [backgroundColor]="host()!.background_color_code"
  >
      @for (service of host()!.service; track service.id) {
        <netplan-service-card [service]="service"></netplan-service-card>
      }
  </netplan-card>
</ng-container>
